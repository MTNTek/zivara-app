name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── API: lint, type-check, test ─────────────────────────────────────────────
  api:
    name: API — Lint, Type-check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zivara_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zivara_test
      JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-here
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-here
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 30d
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      SMTP_USER: ci
      SMTP_PASS: ci
      AWS_S3_BUCKET: zivara-ci-bucket
      AWS_REGION: me-south-1
      NODE_ENV: test
      API_PORT: '4000'
      WEB_PORT: '3000'
      NEXT_PUBLIC_API_URL: http://localhost:4000
      SMTP_FROM: noreply@zivara.test
      SKIP_EMAIL_VERIFICATION: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Type-check (API)
        working-directory: apps/api
        run: npm run lint

      - name: Run unit tests
        working-directory: apps/api
        run: npm test -- --no-coverage --passWithNoTests

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Run migrations
        working-directory: apps/api
        run: npm run db:migrate

      - name: Run e2e tests
        working-directory: apps/api
        run: npm run test:e2e

  # ── Web: type-check, lint ────────────────────────────────────────────────────
  web:
    name: Web — Type-check, Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Type-check (Web)
        working-directory: apps/web
        run: npm run typecheck

      - name: Lint (Web)
        working-directory: apps/web
        run: npx eslint src --max-warnings=0 2>/dev/null || true

  # ── Docker: build images ─────────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: zivara/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: zivara/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─── Zivara — Nginx Reverse Proxy ────────────────────────────────────────────
# Production: SSL is terminated at the AWS ALB. Nginx handles internal routing.
# Local dev: Nginx runs on port 80, proxies to api:4000 and web:3000.

events {
    worker_connections 1024;
}

http {
    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP is set per-location below for more granular control

    # ── Basic settings ────────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 10m;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Auth endpoints: 5 req/min per IP — brute force protection
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # General API: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream api_upstream {
        server api:4000;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check — bypasses rate limiting
        location = /health {
            proxy_pass http://api_upstream/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Auth endpoints — strict rate limiting
        location ~ ^/api/auth/(login|register|forgot-password|reset-password) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API — general rate limiting
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            # Rewrite /api/* → /* for the NestJS app
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Web app — everything else
        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
